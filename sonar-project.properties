# SonarQube configuration for BE-CommonServices (Node.js / Express)
sonar.projectKey=chaturbhujaplots-salestool-be-commonservices
sonar.projectName=Chaturbhujaplots SalesTool - Common Services
sonar.projectVersion=1.0

# Source settings
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/__tests__/**,**/*.test.*,**/*.spec.*,**/coverage/**

# Test settings
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.language=js
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
