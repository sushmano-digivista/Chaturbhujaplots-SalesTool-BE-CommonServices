# SonarCloud configuration - Chaturbhujaplots SalesTool - Common Services
sonar.projectKey=sushmano-digivista_Chaturbhujaplots-SalesTool-BE-CommonServices
sonar.organization=sushmano-digivista

sonar.projectName=Chaturbhujaplots SalesTool - Common Services
sonar.projectVersion=1.0

# ── Node.js sources only ─────────────────────────────────────────────
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/__tests__/**,**/*.test.*,**/*.spec.*,**/coverage/**,**/src/main/java/**,**/src/test/java/**

